<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Rifa - Genesys</title>
    
    <!-- Cargando Tailwind CSS para los estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'grill-dark': '#1a1a1a',
                        'grill-gray': '#2d2d2d',
                        'fire-orange': '#ff5a00',
                        'fire-yellow': '#ff9a00'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #1a1a1a;
            /* Patrón sutil para que no sea un fondo negro plano */
            background-image: radial-gradient(#3a3a3a 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .gradient-text {
            background: linear-gradient(to right, #ff5a00, #ff9a00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .pulse-slow {
            animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .8; }
        }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col justify-between overflow-x-hidden">

    <main class="flex-grow flex flex-col items-center justify-center p-6 text-center max-w-md mx-auto w-full relative z-10 mt-10">
        
        <!-- Ícono de Fuego (SVG) -->
        <div class="mb-6 bg-grill-gray p-4 rounded-full shadow-[0_0_30px_rgba(255,90,0,0.3)]">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 text-fire-orange" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 18.657A8 8 0 016.343 7.343S7 9 9 10c0-2 .5-5 2.986-7C14 5 16.09 5.777 17.656 7.343A7.975 7.975 0 0120 13a7.975 7.975 0 01-2.343 5.657z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.879 16.121A3 3 0 1012.015 11L11 14H9c0 .768.293 1.536.879 2.121z" />
            </svg>
        </div>

        <h3 class="uppercase tracking-widest text-sm text-gray-400 font-semibold mb-2">Evento Exclusivo</h3>
        <h1 class="text-4xl md:text-5xl font-extrabold mb-4 leading-tight">
            Gran Rifa <span class="gradient-text">Genesys</span>
        </h1>
        
        <p class="text-gray-300 mb-10 text-lg">
            Bienvenido al sitio para hablar con <strong class="text-white">little GC</strong>, él te ayudará con el registro a la rifa el día de hoy. 🎁✨
        </p>

        <button 
            onclick="openChatWidget()"
            class="group relative w-full bg-gradient-to-r from-fire-orange to-fire-yellow text-white font-bold text-xl py-4 px-8 rounded-2xl shadow-[0_10px_20px_rgba(255,90,0,0.4)] transform transition duration-200 hover:scale-[1.02] active:scale-95 flex items-center justify-center gap-3">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
            </svg>
            ¡Abrir chat y registrarme!
        </button>

        <!-- Mensaje de estado oculto (Reemplaza el uso de alert) -->
        <div id="statusMessage" class="hidden mt-6 bg-grill-gray border border-fire-orange/50 text-gray-200 px-4 py-3 rounded-lg text-sm transition-opacity duration-300">
            Cargando a little GC... dame un segundito. ⏳
        </div>
        
    </main>

    <footer class="pb-6 pt-10 text-center text-xs text-gray-500 relative z-10">
        <p>Powered by Genesys & little GC ✌️</p>
    </footer>

    <script>
        // Función para interactuar con el widget de Genesys mediante el botón
        function openChatWidget() {
            const statusBox = document.getElementById('statusMessage');
            
            // Verificamos si el objeto Genesys ya se cargó en la página
            if (window.Genesys) {
                // Comando oficial de Genesys para abrir la ventana del Messenger
                window.Genesys("command", "Messenger.open", {},
                    function(o) {
                        // Success - Se abrió el chat, podemos ocultar el mensaje si estaba visible
                        statusBox.classList.add('hidden');
                    },
                    function(o) {
                        // Error abriendo el chat
                        statusBox.textContent = "¡Ups! Tuvimos un problemita abriendo el chat. Intenta recargar la página.";
                        statusBox.classList.remove('hidden');
                    }
                );
            } else {
                // Si el script aún no carga, mostramos un mensajito amigable en la UI
                statusBox.classList.remove('hidden');
                
                // Reintentamos abrir en 2 segundos
                setTimeout(() => {
                    if (window.Genesys) {
                        window.Genesys("command", "Messenger.open");
                        statusBox.classList.add('hidden');
                    }
                }, 2000);
            }
        }
    </script>

    <!-- ========================================================= -->
    <!-- ⚠️ AQUI VA TU SNIPPET DE GENESYS MESSENGER ⚠️           -->
    <!-- ========================================================= -->
    <script type="text/javascript" charset="utf-8">
        (function (g, e, n, es, ys) {
            g['_genesysJs'] = e;
            g[e] = g[e] || function () {
            (g[e].q = g[e].q || []).push(arguments)
            };
            g[e].t = 1 * new Date();
            g[e].c = es;
            ys = document.createElement('script'); ys.async = 1; ys.src = n; ys.charset = 'utf-8'; document.head.appendChild(ys);
        })(window, 'Genesys', 'https://apps.mypurecloud.com/genesys-bootstrap/genesys.min.js', {
            environment: 'prod',
            deploymentId: '2cda1efe-c365-4ca7-b9e4-5f29191da7ad'
        });
    </script>
    <!-- ========================================================= -->

</body>
</html>
